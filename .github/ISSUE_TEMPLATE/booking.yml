name: Booking request
description: Richiedi prenotazione di una risorsa di calcolo
title: "[BOOKING] <resource-id> <start-end>"
labels:
  - booking
  - status:pending
body:
  - type: markdown
    attributes:
      value: |
        Compila tutti i campi in UTC.
  - type: input
    id: resource
    attributes:
      label: Resource ID
      description: Esempio: server-a, cluster-x, vm-nlp-01
      placeholder: server-a
    validations:
      required: true
  - type: input
    id: start_utc
    attributes:
      label: Start (UTC)
      description: Formato consigliato ISO 8601
      placeholder: 2026-03-04T09:00:00Z
    validations:
      required: true
  - type: input
    id: end_utc
    attributes:
      label: End (UTC)
      description: Formato consigliato ISO 8601
      placeholder: 2026-03-04T18:00:00Z
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Motivazione tecnica
      placeholder: Train model X with dataset Y
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact
      description: GitHub handle, email o Slack
      placeholder: @username
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Security policy
      options:
        - label: Non inseriro credenziali/segreti nell'issue.
          required: true

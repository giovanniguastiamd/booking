name: Booking request
description: Request a compute resource booking
title: "[BOOKING] <resource-id> <start-end>"
labels:
  - booking
  - status:pending
body:
  - type: markdown
    attributes:
      value: |
        Fill in all fields in UTC.
  - type: input
    id: resource
    attributes:
      label: Resource ID
      description: Example: server-a, cluster-x, vm-nlp-01
      placeholder: server-a
    validations:
      required: true
  - type: input
    id: start_utc
    attributes:
      label: Start (UTC)
      description: Recommended format: ISO 8601
      placeholder: 2026-03-04T09:00:00Z
    validations:
      required: true
  - type: input
    id: end_utc
    attributes:
      label: End (UTC)
      description: Recommended format: ISO 8601
      placeholder: 2026-03-04T18:00:00Z
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Technical reason
      placeholder: Train model X with dataset Y
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact
      description: GitHub handle, email, or Slack
      placeholder: @username
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Security policy
      options:
        - label: I will not include credentials or secrets in this issue.
          required: true

name: Reserve a machine
description: Tell us which machine you need and for how long
title: "Booking <resource-id>"
labels:
  - booking
  - status:pending
body:
  - type: markdown
    attributes:
      value: |
        Fill in the fields below. Suggested times are already prefilled.
        Use UTC format without seconds: `YYYY-MM-DDTHH:MMZ`.
  - type: input
    id: resource
    attributes:
      label: Resource ID
      description: Machine code you want to reserve
      placeholder: tw022
    validations:
      required: true
  - type: input
    id: start_utc
    attributes:
      label: Start (UTC)
      description: When you want to start
      placeholder: 2026-03-04T09:00Z
    validations:
      required: true
  - type: input
    id: end_utc
    attributes:
      label: End (UTC)
      description: When you expect to finish
      placeholder: 2026-03-05T09:00Z
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Short plain-language reason
      placeholder: Example: run training for the recommendation model
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact
      description: How we can reach you
      placeholder: @username
    validations:
      required: true

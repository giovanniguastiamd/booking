name: Booking triage

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  validate-booking:
    if: contains(join(github.event.issue.labels.*.name, ','), 'booking')
    runs-on: ubuntu-latest
    steps:
      - name: Validate and label booking issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const marker = "<!-- booking-bot -->";
            const BUSY_STATUS_LABELS = new Set(["status:pending", "status:approved", "status:active"]);
            const FIELD_TITLES = ["Resource ID", "Start (UTC)", "End (UTC)", "Reason", "Contact"];

            const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const extractField = (body, title) => {
              const source = body || "";

              const markdownHeading = new RegExp(`###\\s*${escapeRegex(title)}\\s*\\n([\\s\\S]*?)(?=\\n###\\s|$)`, "i");
              const headingMatch = source.match(markdownHeading);
              if (headingMatch?.[1]) return headingMatch[1].trim();

              const keyValue = new RegExp(`^\\s*${escapeRegex(title)}\\s*:\\s*(.+)$`, "im");
              const keyValueMatch = source.match(keyValue);
              if (keyValueMatch?.[1]) return keyValueMatch[1].trim();

              const titlesAlternation = FIELD_TITLES.map(escapeRegex).join("|");
              const blockFormat = new RegExp(
                `(?:^|\\n)\\s*${escapeRegex(title)}\\s*\\n([\\s\\S]*?)(?=\\n\\s*(?:${titlesAlternation})\\s*(?:\\n|:)|$)`,
                "i"
              );
              const blockMatch = source.match(blockFormat);
              return (blockMatch?.[1] || "").trim();
            };

            const parseTime = (value) => {
              const date = new Date(value);
              if (Number.isNaN(date.getTime())) return null;
              return date;
            };

            const overlaps = (aStart, aEnd, bStart, bEnd) => aStart < bEnd && bStart < aEnd;
            const issueLabels = issue.labels.map((label) => label.name || label);

            const resourceFromLabel = issueLabels.find((name) => name.startsWith("resource:"))?.slice("resource:".length);
            const body = issue.body || "";
            const resource = extractField(body, "Resource ID") || resourceFromLabel || "";
            const startRaw = extractField(body, "Start (UTC)");
            const endRaw = extractField(body, "End (UTC)");
            const contact = extractField(body, "Contact");

            const start = parseTime(startRaw);
            const end = parseTime(endRaw);

            const updateBotComment = async (message) => {
              const { owner, repo } = context.repo;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100
              });
              const body = `${marker}\n${message}`;
              const existing = comments.find((c) => c.user?.type === "Bot" && c.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body });
              }
            };

            const setStatusAndResourceLabels = async (statusLabel, normalizedResource) => {
              const { owner, repo } = context.repo;
              const cleanLabels = issueLabels.filter((name) => !name.startsWith("status:") && !name.startsWith("resource:"));
              const next = new Set([...cleanLabels, "booking", statusLabel]);
              if (normalizedResource) next.add(`resource:${normalizedResource}`);
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [...next]
              });
            };

            if (!resource || !start || !end || !(start < end) || !contact) {
              await setStatusAndResourceLabels("status:denied", resource || "unknown");
              await updateBotComment(
                "Booking automatically denied: missing or invalid fields. " +
                "Required: `Resource ID`, `Start (UTC)`, `End (UTC)` with start < end, and `Contact`."
              );
              return;
            }

            const { owner, repo } = context.repo;
            const openBookings = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "booking",
              per_page: 100
            });

            const blockers = [];
            for (const candidate of openBookings) {
              if (candidate.number === issue.number) continue;

              const labels = candidate.labels.map((label) => label.name || label);
              if (!labels.some((name) => BUSY_STATUS_LABELS.has(name))) continue;

              const candidateResourceFromLabel =
                labels.find((name) => name.startsWith("resource:"))?.slice("resource:".length) || "";
              const candidateBody = candidate.body || "";
              const candidateResource = extractField(candidateBody, "Resource ID") || candidateResourceFromLabel;
              if (candidateResource !== resource) continue;

              const candidateStart = parseTime(extractField(candidateBody, "Start (UTC)"));
              const candidateEnd = parseTime(extractField(candidateBody, "End (UTC)"));
              if (!candidateStart || !candidateEnd || !(candidateStart < candidateEnd)) continue;

              if (overlaps(start, end, candidateStart, candidateEnd)) {
                blockers.push(candidate.number);
              }
            }

            if (blockers.length) {
              await setStatusAndResourceLabels("status:denied", resource);
              await updateBotComment(
                `Conflict detected on \`${resource}\` with issues: ${blockers.map((n) => `#${n}`).join(", ")}. ` +
                "This request was labeled `status:denied`."
              );
              return;
            }

            await setStatusAndResourceLabels("status:approved", resource);
            await updateBotComment(
              `Booking approved for \`${resource}\` from ${start.toISOString()} to ${end.toISOString()} (UTC).`
            );

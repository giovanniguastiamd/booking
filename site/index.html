<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Team Compute Booking</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-repo="giovanniguastiamd/booking">
    <header class="hero">
      <div>
        <h1>Team Compute Booking</h1>
        <p>Resource status, reservations, and access instructions in one place.</p>
        <p class="muted">Times are shown in your local timezone. Booking fields use UTC.</p>
      </div>
      <a class="button primary" id="new-booking-link" href="#" target="_blank" rel="noreferrer">Book Resource</a>
    </header>

    <main>
      <section>
        <h2>Resources</h2>
        <div id="resource-list" class="grid"></div>
      </section>

      <section>
        <h2>Reservations</h2>
        <table>
          <thead>
            <tr>
              <th>Resource</th>
              <th>Owner</th>
              <th>Start (Local)</th>
              <th>End (Local)</th>
              <th>Status</th>
              <th>Issue</th>
            </tr>
          </thead>
          <tbody id="reservation-table-body"></tbody>
        </table>
      </section>
    </main>

    <footer>
      <p id="last-updated">Data updated: -</p>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
